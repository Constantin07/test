name: Kubespray lint

on:
  pull_request:
    paths:
      - 'kubespray/**'
      - .github/workflows/kubespray-lint.yml

  push:
    paths:
      - 'kubespray/**'
      - .github/workflows/kubespray-lint.yml
    branches: [ master ]

  workflow_dispatch:

permissions:
  contents: read

jobs:
  kubespray-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: kubespray
    steps:
      - name: Checkout source code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: 'pip' # cache pip dependencies

      - name: Install dependencies
        run: make deps

      - name: Install collections
        run: make collections

      - name: Show installed versions
        run: |
          echo "Ansible version:"
          ansible --version
          echo "Kubespray version:"
          pip show kubespray || echo "Kubespray not installed via pip"

      - name: Run dry-run
        run: |
          # Create fake inventory
          cat <<EOF >> hosts.yaml
          [all]
          localhost ansible_connection=local
          EOF
          
          ansible-playbook -i hosts.yaml cluster.yml --syntax-check
          ansible-playbook cluster.yml --list-tasks
          ansible-playbook cluster.yml --list-hosts
          
