---

helmDefaults:
  cleanupOnFail: false
  verify: false
  wait: true
  timeout: 120
  historyMax: 5

repositories:
  - name: metrics-server
    url: https://kubernetes-sigs.github.io/metrics-server

releases:
  - name: metrics-server
    namespace: system
    createNamespace: true
    chart: metrics-server/metrics-server
    version: 3.13.1
    values:
      - serviceAccount:
          name: metrics-server
        args:
          - "--kubelet-insecure-tls=true"
        apiService:
          create: true
          insecureSkipTLSVerify: true
        resources:
          requests:
            memory: "32Mi"
            cpu: "40m"
#          limits:
#            memory: "32Mi"
#            cpu: "150m"
        podDisruptionBudget:
          enabled: false
